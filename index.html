<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>迷宮の拾い屋 - Recovery Agent</title>

<style>
  /* 全体的な誤操作防止 */
  * {
    box-sizing: border-box;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    /* 1本指での操作は許可し、ダブルタップズーム等を抑制 */
    touch-action: manipulation;
  }

  body {
    margin: 0;
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    /* dvh を使うことで、スマホのメニューバーに押し出されるのを防ぐ */
    height: 100dvh; 
    font-family: 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  #gameContainer {
    width: 100%;
    max-width: 360px; /* PCでは360px、スマホでは画面幅にフィット */
    height: 100dvh;   /* 画面の高さにぴったり合わせる */
    background: #000;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  /* --- 画面レイヤー（Scene）共通設定 --- */
  .scene {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 66%; /* 上部2/3をメイン画面にする */
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: #000;
    color: #fff;
    border-bottom: 2px solid #333;
    box-sizing: border-box;
    padding: 20px;
    z-index: 50;
  }

  /* タイトル画面 */
  #titleScreen { display: flex; background: linear-gradient(180deg, #000 0%, #1a1a1a 100%); }
  h1 { font-size: 38px; margin: 0; color: #ffeb3b; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
  .subtitle { font-size: 16px; margin: 5px 0 30px 0; color: #aaa; letter-spacing: 6px; text-transform: uppercase; }
  .mission-card p, .description  { font-size: 15px; line-height: 1.6; margin-bottom: 20px; white-space: pre-wrap; }

  /* 依頼選択 */
  #missionList { width: 100%; max-height: 280px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; }
  .mission-card { background: #222; border: 1px solid #444; padding: 12px; border-radius: 6px; text-align: left; cursor: pointer; }
  .mission-card h3 { margin: 0 0 5px 0; font-size: 16px; color: #fff; }
  .mission-card p { margin: 0 0 8px 0; font-size: 12px; color: #bbb; line-height: 1.4; }
  
  .mission-stats { font-size: 11px; color: #888; margin-bottom: 5px; border-top: 1px solid #333; padding-top: 5px; }
  .mission-stats span { color: #00e5ff; font-weight: bold; }
  .mission-info { color: #4caf50; font-weight: bold; font-size: 11px; }

  /* 聖職者画面 */
  .priest-msg { font-size: 13px; line-height: 1.5; background: #111; padding: 12px; border-radius: 5px; margin-bottom: 15px; border-left: 4px solid #fff; text-align: left; }
  .gold-display { font-size: 18px; color: #ffeb3b; margin-bottom: 15px; font-weight: bold; }
  .magic-options { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .opt-btn { background: #333; color: #fff; padding: 10px; border: 1px solid #555; font-size: 15px; border-radius: 4px; }
  .opt-btn.selected { background: #6b5b00; border-color: #ffeb3b; box-shadow: 0 0 10px #ffeb3b; }
  .opt-btn:disabled { opacity: 0.3; }

  /* ボタン共通 */
  button { border: none; border-radius: 4px; cursor: pointer; font-family: inherit; }
  .action-btn { padding: 15px 40px; background: #4caf50; color: white; font-size: 18px; font-weight: bold; box-shadow: 0 4px 0 #2e7d32; }
  .action-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #2e7d32; }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .back-btn { margin-top: 10px; background: #555; color: #fff; padding: 8px 20px; font-size: 13px; }

  /* ゲーム画面 & 操作パネル */
  #view { width: 100%; height: 66%; background: #000; display: none; }
  
  #controls {
    width: 100%; 
    height: 34%; /* 下部1/3を操作パネルにする */
    background: #222; 
    display: none;
    grid-template-columns: repeat(3, 1fr); 
    grid-template-rows: repeat(2, 1fr);
    gap: 10px; 
    padding: 15px; 
    box-sizing: border-box;
    /* iPhoneのホームバー（画面下の横棒）に重ならないよう余白を確保 */
    padding-bottom: calc(15px + env(safe-area-inset-bottom));
  }
  
  #controls button { 
    background: #444; 
    color: #fff; 
    font-size: 28px; 
    height: 100%; /* 親のグリッド枠いっぱいに広げる */
    -webkit-tap-highlight-color: transparent; 
    touch-action: none; /* ブラウザのジェスチャーを完全に無視 */
  }
  #controls button:active { background: #666; }

  /* リザルト用 */
  .success { color: #ffeb3b; }
  .failed { color: #f44336; }

  /* ★ここに貼り付けます！★ */
  #resultScreen {
    justify-content: flex-start;
    overflow-y: auto;
    padding: 40px 20px;
  }
  #resultDesc {
    text-align: left;
    margin: 20px 0;
    width: 100%;
    min-height: 80px;
  }
  #resultGold {
    margin-top: 40px;
    padding-top: 15px;
    border-top: 1px solid #333;
    width: 100%;
  }
  #backFromResult {
    margin-top: 20px;
    margin-bottom: 40px;
  }

</style>
</head>

<body onclick="startAudio()">

<div id="gameContainer">
  <div id="titleScreen" class="scene">
    <h1>迷宮の拾い屋</h1>
    <p class="subtitle">Recovery Agent</p>
    <div class="description">依頼を受けて、指定の品を<br>探して戻って来よう！</div>
    <button id="toSelectButton" class="action-btn">依頼選択へ</button>
    <div onclick="resetAllData()" style="position:fixed; bottom:5px; right:5px; font-size:9px; color:#333; cursor:pointer;">Reset</div>
  </div>

  <div id="selectScreen" class="scene">
    <h2>依頼選択</h2>
    <div id="missionList"></div>
    <button id="backToTitle" class="back-btn">タイトルへ戻る</button>
  </div>

  <div id="priestScreen" class="scene">
    <h2>聖職者の加護</h2>
    <div class="priest-msg">ダンジョンに転移させる前に、魔物やトラップを無効化する魔法の持続時間を選んでください。</div>
    <div class="gold-display">所持金: <span id="currentGoldDisplay">0</span> G</div>
<div class="magic-options">
      <button class="opt-btn" onclick="selectMagic(60, 100)">60秒 / 100G</button>
      <button class="opt-btn" onclick="selectMagic(120, 300)">120秒 / 300G</button>
      <button class="opt-btn" onclick="selectMagic(180, 600)">180秒 / 600G</button>
      <button class="opt-btn" onclick="selectMagic(240, 1000)">240秒 / 1000G</button>
      <button class="opt-btn" onclick="selectMagic(300, 1500)">300秒 / 1500G</button>
    </div>
    <div style="margin-top: 20px;"><button id="goButton" class="action-btn" disabled>転移開始 (GO!)</button></div>
    <button id="backToSelect" class="back-btn">依頼選択へ戻る</button>
  </div>

  <div id="confirmDiv" class="scene" style="background: rgba(0,0,0,0.8); z-index: 100;">
    <div class="priest-msg" id="confirmMsg"></div>
    <div style="display: flex; gap: 20px;">
      <button id="exitYes" class="action-btn" style="background: #d32f2f;">はい</button>
      <button id="exitNo" class="action-btn">いいえ</button>
    </div>
  </div>

  <div id="resultScreen" class="scene">
    <h2 id="resultTitle">RESULT</h2>
    <div class="description" id="resultDesc"></div>
    <div class="gold-display" id="resultGold"></div>
    <button id="backFromResult" class="action-btn">帰還する</button>
  </div>

  <canvas id="view"></canvas>

  <canvas id="minimap" width="80" height="80" style="
    position: absolute; top: 10px; left: 10px; 
    background: rgba(0, 0, 0, 0.6); border: 1px solid #555;
    z-index: 20; display: none; pointer-events: none;
  "></canvas>

  <div id="timerDisplay" style="
    position: absolute; top: 10px; right: 10px; 
    color: #ff3d00; font-family: 'Courier New', Courier, monospace;
    font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000;
    z-index: 20; display: none;
  ">TIME: --</div>

  <div id="controls">
    <div></div><button id="up">↑</button><div></div>
    <button id="left">←</button><button id="down">↓</button><button id="right">→</button>
  </div>
</div>

<script src="js/stage.js"></script>
<script src="js/game.js"></script>

</body>
</html>
